name: macOS build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # project.yml is tracked; *.xcodeproj is gitignored — generate before xcodebuild
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # XcodeGen on a new Xcode toolchain may emit objectVersion 77 (Xcode 16+). GitHub
      # macos-14 images still ship Xcode 15.4, which refuses to open that format (exit 74).
      - name: Align project file format with Xcode 15 (CI)
        run: perl -pi -e 's/objectVersion = 77;/objectVersion = 60;/' PrayerTimer.xcodeproj/project.pbxproj

      - name: Build Release (unsigned)
        run: |
          set -euo pipefail
          DERIVED="$RUNNER_TEMP/DerivedData"
          xcodebuild -scheme PrayerTimer \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath "$DERIVED" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build
          ditto -c -k --sequesterRsrc --keepParent \
            "$DERIVED/Build/Products/Release/PrayerTimer.app" \
            PrayerTimer-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: PrayerTimer-macOS
          path: PrayerTimer-macOS.zip
